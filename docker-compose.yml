services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      branchtree:
        condition: service_healthy

  branchtree:
    build: .
    expose:
      - "3001"
    volumes:
      - branchtree-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATA_DIR=/app/data
      - DB_PATH=/app/data/branchtree.sqlite
      - LOG_LEVEL=info
      # REQUIRED: Generate with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - SETTINGS_ENCRYPTION_KEY=${SETTINGS_ENCRYPTION_KEY:?Set SETTINGS_ENCRYPTION_KEY in .env or environment}
    restart: unless-stopped

volumes:
  branchtree-data:
  caddy-data:
  caddy-config:
