services:
  branchtree:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - branchtree-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATA_DIR=/app/data
      - DB_PATH=/app/data/branchtree.sqlite
      - LOG_LEVEL=info
      # REQUIRED: Generate with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - SETTINGS_ENCRYPTION_KEY=${SETTINGS_ENCRYPTION_KEY:?Set SETTINGS_ENCRYPTION_KEY in .env or environment}
    restart: unless-stopped

volumes:
  branchtree-data:
